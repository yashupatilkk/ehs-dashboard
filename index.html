<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EHS Dashboard FINAL AUTO FIX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
  background: linear-gradient(to right,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:15px;
}

.slide { display:none; }
.active { display:block; }

.container {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px;
}

.box {
  background:black;
  color:white;
  padding:20px;
  text-align:center;
  border-radius:8px;
}

.value { font-size:35px; }

.chartBox { width:300px; margin:auto; }

table {
  width:95%;
  margin:auto;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th {
  background:#1e3c72;
  color:white;
}

.red { background:red; color:white; }

.controls { text-align:center; margin:15px; }

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#1e3c72;
  color:white;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>EHS Dashboard</h2>
<div id="time"></div>
</header>

<!-- SLIDE 1 -->
<div class="slide active">
<div class="container">
<div class="box">Manhours (<span id="mMonth"></span>)<br><div class="value" id="manhours">0</div></div>
<div class="box">Near Miss (<span id="month1"></span>)<br><div class="value" id="near">0</div></div>
<div class="box">Incident (<span id="month2"></span>)<br><div class="value" id="incident">0</div></div>
</div>

<div class="chartBox">
<canvas id="ehsPie"></canvas>
</div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3 style="text-align:center;">Compliance (≤ 90 Days Only)</h3>
<table>
<thead>
<tr><th>SL</th><th>Compliance</th><th>Due Days</th><th>Next Due Date</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h3 style="text-align:center;">
Water Summary - <span id="waterMonth"></span>
</h3>

<div class="container">
<div class="box">WTP<br><div class="value" id="wtp">0</div></div>
<div class="box">BWSSB<br><div class="value" id="bwssb">0</div></div>
<div class="box">STP<br><div class="value" id="stp">0</div></div>

<div class="box">Rain<br><div class="value" id="rain">0</div></div>
<div class="box">School<br><div class="value" id="school">0</div></div>
<div class="box">RO<br><div class="value" id="ro">0</div></div>

<div class="box">CWTP<br><div class="value" id="cwtp">0</div></div>
<div class="box">CSTP<br><div class="value" id="cstp">0</div></div>
</div>

<div class="chartBox">
<canvas id="waterPie"></canvas>
</div>
</div>

<div class="controls">
<button onclick="prevSlide()">⬅ Prev</button>
<button onclick="nextSlide()">Next ➡</button>
</div>

<script>

/* TIME */
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleString('en-IN',{
weekday:'long',year:'numeric',month:'long',day:'numeric',
hour:'2-digit',minute:'2-digit',second:'2-digit'
});
},1000);

/* MONTH */
let currentMonth = new Date().toLocaleString('en-IN',{month:'long'});
document.getElementById("month1").innerText = currentMonth;
document.getElementById("month2").innerText = currentMonth;
document.getElementById("mMonth").innerText = currentMonth;

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}
function nextSlide(){ current=(current+1)%slides.length; show(current); }
function prevSlide(){ current=(current-1+slides.length)%slides.length; show(current); }
setInterval(nextSlide,15000);

/* CSV */
async function csv(url){
let r=await fetch(url+"&_="+Date.now());
let t=await r.text();
return t.trim().split("\n").map(x=>x.split(","));
}

/* SHEETS */
const nearSheet="https://docs.google.com/spreadsheets/d/1NDBJNjEyQOr_Pc0cJaEE1jm8lGqLZWLgiH5uQ5fAr2w/export?format=csv&gid=645044779";
const incidentSheet="https://docs.google.com/spreadsheets/d/1O95sjMBE-vzSm-cdRlN98OjqPX_mubWSAL1nJuio6bA/export?format=csv&gid=1861922433";
const compSheet="https://docs.google.com/spreadsheets/d/1orsK8rpDVKNbQJa8aaCczKvoASL01KcV/export?format=csv&gid=623918223";
const manhoursSheet="https://docs.google.com/spreadsheets/d/1HMdv_W7UcDzQrNAjRrW9e-nZZhUUA3boYk9ZfAPAv2E/export?format=csv&gid=669455145";
const waterSheet="https://docs.google.com/spreadsheets/d/1b-8OGZK56Ejqm0SO44KzpCyo80awEODk/export?format=csv&gid=1876581317";

/* PIE */
let pie;
function updatePie(a,b){
if(!pie){
pie=new Chart(document.getElementById("ehsPie"),{
type:"pie",
data:{labels:["Near Miss","Incident"],datasets:[{data:[a,b]}]}
});
}else{
pie.data.datasets[0].data=[a,b];
pie.update();
}
}

/* WATER PIE */
let waterPie;
function updateWaterPie(values){
if(!waterPie){
waterPie=new Chart(document.getElementById("waterPie"),{
type:"pie",
data:{
labels:["WTP","BWSSB","STP","Rain","School","RO","CWTP","CSTP"],
datasets:[{data:values}]
}
});
}else{
waterPie.data.datasets[0].data=values;
waterPie.update();
}
}

/* MANHOURS */
async function loadManhoursWorked(){
let data = await csv(manhoursSheet);
let headerRowIndex = data.findIndex(r =>
r.join(" ").toLowerCase().includes("april")
);

if(headerRowIndex === -1) return;

let header = data[headerRowIndex];
let month = new Date().toLocaleString('en-IN',{month:'long'}).toLowerCase();

let monthIndex = header.findIndex(h =>
(h||"").toLowerCase().trim() === month
);

if(monthIndex === -1) return;

let value = 0;

for(let i=headerRowIndex+1;i<data.length;i++){
let name = (data[i][0]||"").toLowerCase();

if(name.includes("manhours worked")){
value = parseFloat((data[i][monthIndex]||0).toString().replace(/,/g,'')) || 0;
break;
}
}

document.getElementById("manhours").innerText = value;
}

/* STATS */
async function loadStats(){
let near=await csv(nearSheet);
let inc=await csv(incidentSheet);
let now=new Date();

function findDate(row){
for(let i=0;i<row.length;i++){
let d=new Date(row[i]);
if(!isNaN(d)) return d;
}
return null;
}

function count(data){
let c=0;
for(let i=1;i<data.length;i++){
let d=findDate(data[i]);
if(!d) continue;
if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()){
c++;
}
}
return c;
}

document.getElementById("near").innerText=count(near);
document.getElementById("incident").innerText=count(inc);

updatePie(count(near),count(inc));
}

/* COMPLIANCE */
async function loadCompliance(){
let data=await csv(compSheet);
let tb=document.getElementById("table");
tb.innerHTML="";
let now=new Date();

for(let i=1;i<data.length;i++){
let d=new Date(data[i][8]);
if(isNaN(d)) continue;

let days=Math.ceil((d-now)/86400000);

if(days>=0 && days<=90){
tb.innerHTML+=`
<tr>
<td>${data[i][0]}</td>
<td>${data[i][1]}</td>
<td class="red">${days}</td>
<td>${d.toLocaleDateString()}</td>
</tr>`;
}
}
}

/* ✅ FINAL WATER FIX */
async function loadWater(){

let data = await csv(waterSheet);

let header = data.find(r => r.join(" ").includes("Apr'25"));
let months = header.slice(2);

let selectedIndex = months.length - 1;

for(let i=months.length-1;i>=0;i--){
let found=false;

for(let r=1;r<data.length;r++){
let val = parseFloat(data[r][i+2]);
if(val && val>0){
found=true;
break;
}
}

if(found){
selectedIndex=i;
break; // ⭐ FIX
}
}

document.getElementById("waterMonth").innerText = months[selectedIndex];

let values = {WTP:0,BWSSB:0,STP:0,Rain:0,School:0,RO:0,CWTP:0,CSTP:0};

for(let i=1;i<data.length;i++){

let name = (data[i][1]||"").toLowerCase();
let val = parseFloat(data[i][selectedIndex+2])||0;

if(name.includes("wtp reading")) values.WTP = val;
else if(name.includes("bwssb")) values.BWSSB = val;
else if(name.includes("stp treated")) values.STP = val;
else if(name.includes("rain")) values.Rain = val;
else if(name.includes("school")) values.School = val;
else if(name.includes("ro")) values.RO = val;
else if(name.includes("chiller wtp")) values.CWTP = val;
else if(name.includes("chiller stp")) values.CSTP = val;
}

document.getElementById("wtp").innerText = values.WTP;
document.getElementById("bwssb").innerText = values.BWSSB;
document.getElementById("stp").innerText = values.STP;
document.getElementById("rain").innerText = values.Rain;
document.getElementById("school").innerText = values.School;
document.getElementById("ro").innerText = values.RO;
document.getElementById("cwtp").innerText = values.CWTP;
document.getElementById("cstp").innerText = values.CSTP;

updateWaterPie([
values.WTP,values.BWSSB,values.STP,values.Rain,
values.School,values.RO,values.CWTP,values.CSTP
]);

}

/* INIT */
loadStats();
loadManhoursWorked();
loadCompliance();
loadWater();

setInterval(loadStats,30000);
setInterval(loadManhoursWorked,60000);
setInterval(loadCompliance,60000);
setInterval(loadWater,60000);

</script>

</body>
</html>
