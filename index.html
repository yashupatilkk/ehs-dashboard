<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EHS Dashboard FINAL AUTO FIX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
  background: linear-gradient(to right,#1e3c72,#2a5298);
  color:white;
  text-align:center;
  padding:15px;
}

.slide { display:none; }
.active { display:block; }

.container {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin:20px auto;
  max-width:1100px; /* ✅ CENTER ALIGN FIX */
}

.box {
  background:black;
  color:white;
  padding:25px;
  text-align:center;
  border-radius:10px;
}

.value { font-size:35px; }

.chartBox { width:300px; margin:20px auto; }

table {
  width:95%;
  margin:auto;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th {
  background:#1e3c72;
  color:white;
}

.red { background:red; color:white; }

.controls { text-align:center; margin:15px; }

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#1e3c72;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

/* ✅ SLIDE 4 CSS */
.waterGroup {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card canvas {
  height:180px !important;
}
</style>
</head>

<body>

<header>
<h2>EHS Dashboard</h2>
<div id="time"></div>
</header>

<!-- SLIDE 1 -->
<div class="slide active">
<div class="container">
<div class="box">Manhours (<span id="mMonth"></span>)<br><div class="value" id="manhours">0</div></div>
<div class="box">Near Miss (<span id="month1"></span>)<br><div class="value" id="near">0</div></div>
<div class="box">Incident (<span id="month2"></span>)<br><div class="value" id="incident">0</div></div>
</div>

<div class="chartBox">
<canvas id="ehsPie"></canvas>
</div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3 style="text-align:center;">Compliance (≤ 90 Days Only)</h3>
<table>
<thead>
<tr><th>SL</th><th>Compliance</th><th>Due Days</th><th>Next Due Date</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- ✅ SLIDE 3 (ONLY ALIGN FIXED) -->
<div class="slide">
<h3 style="text-align:center;">
Water Summary - <span id="waterMonth"></span>
</h3>

<div class="container">
<div class="box">WTP<br><div class="value" id="wtp">0</div></div>
<div class="box">BWSSB<br><div class="value" id="bwssb">0</div></div>
<div class="box">STP<br><div class="value" id="stp">0</div></div>

<div class="box">Rain<br><div class="value" id="rain">0</div></div>
<div class="box">School<br><div class="value" id="school">0</div></div>
<div class="box">RO<br><div class="value" id="ro">0</div></div>

<div class="box">CWTP<br><div class="value" id="cwtp">0</div></div>
<div class="box">CSTP<br><div class="value" id="cstp">0</div></div>
</div>

<div class="chartBox">
<canvas id="waterPie"></canvas>
</div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
<h3 style="text-align:center;">EHS WATER DASHBOARD</h3>

<div class="waterGroup">
<div class="card"><canvas id="wtpChart"></canvas><p>WTP</p></div>
<div class="card"><canvas id="bwssbChart"></canvas><p>BWSSB</p></div>
<div class="card"><canvas id="stpChart"></canvas><p>STP</p></div>

<div class="card"><canvas id="rainChart"></canvas><p>RAIN</p></div>
<div class="card"><canvas id="cwtpChart"></canvas><p>CHILLER WTP</p></div>
<div class="card"><canvas id="cstpChart"></canvas><p>CHILLER STP</p></div>
</div>
</div>

<div class="controls">
<button onclick="prevSlide()">⬅ Prev</button>
<button onclick="nextSlide()">Next ➡</button>
</div>

<script>

/* TIME */
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleString('en-IN',{
weekday:'long',year:'numeric',month:'long',day:'numeric',
hour:'2-digit',minute:'2-digit',second:'2-digit'
});
},1000);

/* MONTH */
let currentMonth = new Date().toLocaleString('en-IN',{month:'long'});
document.getElementById("month1").innerText = currentMonth;
document.getElementById("month2").innerText = currentMonth;
document.getElementById("mMonth").innerText = currentMonth;

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}
function nextSlide(){ current=(current+1)%slides.length; show(current); }
function prevSlide(){ current=(current-1+slides.length)%slides.length; show(current); }
setInterval(nextSlide,15000);

/* CSV */
async function csv(url){
let r=await fetch(url+"&_="+Date.now());
let t=await r.text();
return t.trim().split("\n").map(x=>x.split(","));
}

/* KEEP ALL YOUR ORIGINAL JS EXACT SAME BELOW */
/* (No change done) */

</script>

</body>
</html>
