<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EHS Dashboard FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 15px;
}

#time {
    margin-top: 5px;
}

.slide { display: none; }
.active { display: block; }

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 20px;
}

.box {
    background: black;
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 8px;
}

.value {
    font-size: 35px;
}

/* PIE CHART */
.chartBox {
    width: 300px;
    margin: 20px auto;
}

/* TABLE */
table {
    width: 95%;
    margin: auto;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

th {
    background: #1e3c72;
    color: white;
}

.red { background: red; color: white; }

.controls {
    text-align: center;
    margin: 15px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #1e3c72;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
button:hover {
    background: #2a5298;
}
</style>
</head>

<body>

<header>
<h2>EHS Dashboard</h2>
<div id="time"></div>
</header>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">

<div class="container">
    <div class="box">
        Manhours<br><div class="value">4520</div>
    </div>

    <div class="box">
        Near Miss (<span id="month1"></span>)<br>
        <div class="value" id="near">0</div>
    </div>

    <div class="box">
        Incident (<span id="month2"></span>)<br>
        <div class="value" id="incident">0</div>
    </div>
</div>

<!-- PIE CHART ADDED ONLY HERE -->
<div class="chartBox">
    <canvas id="ehsPie"></canvas>
</div>

</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">

<h3 style="text-align:center;">Compliance (≤ 90 Days Only)</h3>

<table>
<thead>
<tr>
<th>SL</th>
<th>Compliance</th>
<th>Due Days</th>
<th>Next Due Date</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- BUTTONS -->
<div class="controls">
    <button onclick="prevSlide()">⬅ Prev</button>
    <button onclick="nextSlide()">Next ➡</button>
</div>

<script>

/* TIME */
setInterval(()=>{
    let now = new Date();

    let day = now.toLocaleString('en-IN', { weekday: 'long' });
    let date = now.getDate();
    let month = now.toLocaleString('en-IN', { month: 'long' });
    let year = now.getFullYear();
    let time = now.toLocaleTimeString('en-IN');

    document.getElementById("time").innerText =
        `${day} | ${date} ${month} ${year} | ${time}`;
},1000);

/* MONTH */
function setMonthNames(){
    let now = new Date();
    let month = now.toLocaleString('en-IN', { month: 'long' });

    document.getElementById("month1").innerText = month;
    document.getElementById("month2").innerText = month;
}
setMonthNames();

/* SHEETS */
const nearSheet = "https://docs.google.com/spreadsheets/d/1NDBJNjEyQOr_Pc0cJaEE1jm8lGqLZWLgiH5uQ5fAr2w/export?format=csv&gid=645044779";
const incidentSheet = "https://docs.google.com/spreadsheets/d/1O95sjMBE-vzSm-cdRlN98OjqPX_mubWSAL1nJuio6bA/export?format=csv&gid=1861922433";
const compSheet = "https://docs.google.com/spreadsheets/d/1orsK8rpDVKNbQJa8aaCczKvoASL01KcV/export?format=csv&gid=623918223";

/* CSV */
async function getCSV(url){
    let res = await fetch(url);
    let text = await res.text();

    return text.trim().split("\n").map(r =>
        r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
    );
}

/* DATE */
function parseDate(v){
    if(!v) return null;

    let d = new Date(v);
    if(!isNaN(d)) return d;

    let p = v.split("/");
    if(p.length === 3){
        return new Date(p[2], p[1]-1, p[0]);
    }
    return null;
}

/* PIE CHART (NEW ONLY) */
let pieChart;

function updatePie(near, inc){

    if(!pieChart){
        pieChart = new Chart(document.getElementById("ehsPie"), {
            type: 'pie',
            data: {
                labels: ['Near Miss', 'Incident'],
                datasets: [{
                    data: [near, inc]
                }]
            }
        });
    } else {
        pieChart.data.datasets[0].data = [near, inc];
        pieChart.update();
    }
}

/* STATS */
async function loadStats(){
    let near = await getCSV(nearSheet);
    let inc = await getCSV(incidentSheet);

    let today = new Date();

    function countThisMonth(data){
        let count = 0;

        for(let i=1;i<data.length;i++){
            let d = parseDate(data[i][0]);
            if(!d) continue;

            if(d.getMonth() === today.getMonth() &&
               d.getFullYear() === today.getFullYear()){
                count++;
            }
        }
        return count;
    }

    let nearCount = countThisMonth(near);
    let incCount = countThisMonth(inc);

    document.getElementById("near").innerText = nearCount;
    document.getElementById("incident").innerText = incCount;

    /* UPDATE PIE CHART */
    updatePie(nearCount, incCount);
}

/* COMPLIANCE */
async function loadCompliance(){

    let data = await getCSV(compSheet);
    let list = [];

    for(let i=1;i<data.length;i++){

        let sl = data[i][0];
        let compliance = data[i][1];
        let nextDue = data[i][8];

        let date = parseDate(nextDue);
        if(!date) continue;

        let today = new Date();
        let days = Math.ceil((date - today)/(1000*60*60*24));

        if(days >= 0 && days <= 90){
            list.push({ sl, compliance, days, date });
        }
    }

    let tbody = document.getElementById("table");
    tbody.innerHTML = "";

    if(list.length === 0){
        tbody.innerHTML = "<tr><td colspan='4'>No compliance due in 90 days</td></tr>";
        return;
    }

    list.forEach(r=>{
        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${r.sl}</td>
            <td>${r.compliance}</td>
            <td class="red">${r.days}</td>
            <td>${r.date.toLocaleDateString()}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* SLIDES */
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(n){
    slides.forEach(s => s.classList.remove("active"));
    slides[n].classList.add("active");
}

function nextSlide(){
    currentSlide = (currentSlide + 1) % slides.length;
    showSlide(currentSlide);
}

function prevSlide(){
    currentSlide = (currentSlide - 1 + slides.length) % slides.length;
    showSlide(currentSlide);
}

/* AUTO SLIDE */
setInterval(nextSlide, 40000);

/* INIT */
loadStats();
loadCompliance();

setInterval(loadStats, 30000);
setInterval(loadCompliance, 60000);

setInterval(()=>{
    showSlide(currentSlide);
}, 1000);

</script>

</body>
</html>
