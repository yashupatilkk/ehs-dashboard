<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EHS Dashboard FINAL PERFECT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
    background: linear-gradient(to right,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    padding:15px;
}

.slide { display:none; }
.active { display:block; }

.container {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:20px;
}

.box {
    background:black;
    color:white;
    padding:20px;
    text-align:center;
    border-radius:8px;
}

.value { font-size:35px; }

.chartBox { width:300px; margin:auto; }

table {
    width:95%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th, td {
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th {
    background:#1e3c72;
    color:white;
}

.red { background:red; color:white; }

.controls { text-align:center; margin:15px; }

button {
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#1e3c72;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>EHS Dashboard</h2>
<div id="time"></div>
</header>

<!-- SLIDE 1 -->
<div class="slide active">

<div class="container">

<div class="box">
Manhours (<span id="mMonth"></span>)<br>
<div class="value" id="manhours">0</div>
</div>

<div class="box">
Near Miss (<span id="month1"></span>)<br>
<div class="value" id="near">0</div>
</div>

<div class="box">
Incident (<span id="month2"></span>)<br>
<div class="value" id="incident">0</div>
</div>

</div>

<div class="chartBox">
<canvas id="ehsPie"></canvas>
</div>

</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3 style="text-align:center;">Compliance (≤ 90 Days Only)</h3>

<table>
<thead>
<tr>
<th>SL</th>
<th>Compliance</th>
<th>Due Days</th>
<th>Next Due Date</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="controls">
<button onclick="prevSlide()">⬅ Prev</button>
<button onclick="nextSlide()">Next ➡</button>
</div>

<script>

/* TIME */
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleString('en-IN',{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric',
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});
},1000);

/* MONTH NAME */
let currentMonth = new Date().toLocaleString('en-IN',{month:'long'});
document.getElementById("month1").innerText = currentMonth;
document.getElementById("month2").innerText = currentMonth;
document.getElementById("mMonth").innerText = currentMonth;

/* SLIDES */
let current=0;
const slides=document.querySelectorAll(".slide");

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}

function nextSlide(){
current=(current+1)%slides.length;
show(current);
}

function prevSlide(){
current=(current-1+slides.length)%slides.length;
show(current);
}

setInterval(nextSlide,15000);

/* SHEETS */
const nearSheet="https://docs.google.com/spreadsheets/d/1NDBJNjEyQOr_Pc0cJaEE1jm8lGqLZWLgiH5uQ5fAr2w/export?format=csv&gid=645044779";
const incidentSheet="https://docs.google.com/spreadsheets/d/1O95sjMBE-vzSm-cdRlN98OjqPX_mubWSAL1nJuio6bA/export?format=csv&gid=1861922433";
const compSheet="https://docs.google.com/spreadsheets/d/1orsK8rpDVKNbQJa8aaCczKvoASL01KcV/export?format=csv&gid=623918223";
const manhoursSheet="https://docs.google.com/spreadsheets/d/1HMdv_W7UcDzQrNAjRrW9e-nZZhUUA3boYk9ZfAPAv2E/export?format=csv&gid=669455145";

/* CSV */
async function csv(url){
let r=await fetch(url+"&_="+Date.now());
let t=await r.text();
return t.trim().split("\n").map(x=>x.split(","));
}

/* DATE FIX */
function parseDate(v){
if(!v) return null;

let d=new Date(v);
if(!isNaN(d)) return d;

let p=v.split("/");
if(p.length===3){
return new Date(p[2],p[1]-1,p[0]);
}
return null;
}

/* PIE */
let pie;
function updatePie(a,b){
if(!pie){
pie=new Chart(document.getElementById("ehsPie"),{
type:"pie",
data:{labels:["Near Miss","Incident"],datasets:[{data:[a,b]}]}
});
}else{
pie.data.datasets[0].data=[a,b];
pie.update();
}
}

/* ✅ MANHOURS (YOUR ORIGINAL WORKING LOGIC — SAFE) */
async function loadManhoursWorked(){

let data = await csv(manhoursSheet);

let headerRowIndex = -1;

for(let i=0;i<data.length;i++){
let row = data[i].join("").toLowerCase();
if(row.includes("january") && row.includes("february")){
headerRowIndex = i;
break;
}
}

if(headerRowIndex === -1) return;

let header = data[headerRowIndex];

let aprilIndex = header.findIndex(h =>
(h || "").toLowerCase().includes(currentMonth.toLowerCase())
);

let value = 0;

for(let i=headerRowIndex+1;i<data.length;i++){

let name = (data[i][0] || "")
.toLowerCase()
.replace(/[^a-z]/g,'');

if(name.includes("manhoursworked")){

value = parseFloat(
(data[i][aprilIndex] || "0")
.toString()
.replace(/,/g,'')
) || 0;

break;
}
}

document.getElementById("manhours").innerText = value;
}

/* ✅ FIXED NEAR + INCIDENT */
async function loadStats(){

let near=await csv(nearSheet);
let inc=await csv(incidentSheet);

let now=new Date();

function findDate(row){
for(let i=0;i<row.length;i++){
let d=parseDate(row[i]);
if(d) return d;
}
return null;
}

function count(data){
let c=0;
for(let i=1;i<data.length;i++){
let d=findDate(data[i]);
if(!d) continue;

if(d.getMonth()===now.getMonth() &&
d.getFullYear()===now.getFullYear()){
c++;
}
}
return c;
}

let nearCount=count(near);
let incCount=count(inc);

document.getElementById("near").innerText=nearCount;
document.getElementById("incident").innerText=incCount;

updatePie(nearCount,incCount);
}

/* COMPLIANCE */
async function loadCompliance(){

let data=await csv(compSheet);
let tb=document.getElementById("table");
tb.innerHTML="";

let now=new Date();

for(let i=1;i<data.length;i++){

let d=parseDate(data[i][8]);
if(!d) continue;

let days=Math.ceil((d-now)/86400000);

if(days>=0 && days<=90){

tb.innerHTML+=`
<tr>
<td>${data[i][0]}</td>
<td>${data[i][1]}</td>
<td class="red">${days}</td>
<td>${d.toLocaleDateString()}</td>
</tr>`;
}
}
}

/* INIT */
loadManhoursWorked();
loadStats();
loadCompliance();

setInterval(loadManhoursWorked,60000);
setInterval(loadStats,30000);
setInterval(loadCompliance,60000);

</script>

</body>
</html>
